[build]
builder = "NIXPACKS"
buildCommand = "npm install && npm run db:generate --workspace=@resolvd/api && npm run build --workspace=@resolvd/api"

[deploy]
startCommand = "npx prisma migrate deploy --schema apps/api/prisma/schema.prisma && node apps/api/dist/index.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
healthcheckPath = "/health"
